name: TITAN Security Scan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  titan-scan:
    runs-on: ubuntu-latest
    name: TITAN Vulnerability Detection
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TITAN Scan
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          
          echo "🔍 Scanning repository: $REPO_URL"
          echo "📊 Using TITAN Workstation"
          
          curl -N -X POST "${{ secrets.TITAN_WORKSTATION_URL }}/chat?stream=true" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.TITAN_WORKSTATION_TOKEN }}" \
            -d "{\"content\": \"$REPO_URL\"}" \
            > titan_results.txt 2>&1 || true
          
          echo "✅ TITAN scan completed"
          cat titan_results.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: titan-scan-results
          path: titan_results.txt
