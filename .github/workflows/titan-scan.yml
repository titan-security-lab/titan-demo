name: TITAN Security Scan

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  titan-scan:
    runs-on: ubuntu-latest
    name: TITAN Vulnerability Detection
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TITAN Scan
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          
          echo "🔍 Scanning repository: $REPO_URL"
          echo "📊 Using TITAN Workstation"
          
          curl -N -X POST "${{ secrets.TITAN_WORKSTATION_URL }}/chat?stream=true" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.TITAN_WORKSTATION_TOKEN }}" \
            -d "{\"content\": \"$REPO_URL\"}" \
            > titan_results.txt 2>&1 || true
          
          echo "✅ TITAN scan completed"

      - name: Parse Results to CSV
        continue-on-error: true
        run: |
          # Extract findings from the event stream
          cat titan_results.txt | grep 'event: findings' -A 1 | grep '^data:' | sed 's/^data: //' > findings_raw.json || echo '{"findings":[]}' > findings_raw.json
          
          # Create CSV with Python
          python3 << 'PYTHON'
          import json
          import csv
          
          try:
              # Read the raw findings
              with open('findings_raw.json', 'r') as f:
                  content = f.read().strip()
                  if content:
                      data = json.loads(content)
                      findings = data.get('findings', [])
                  else:
                      findings = []
              
              # Create CSV
              with open('titan_results.csv', 'w', newline='', encoding='utf-8') as csvfile:
                  writer = csv.writer(csvfile)
                  
                  # Header
                  writer.writerow([
                      'File Path',
                      'Function Name', 
                      'Severity',
                      'Score',
                      'Prediction',
                      'Confidence',
                      'Vulnerable',
                      'Summary'
                  ])
                  
                  # Data rows
                  for f in findings:
                      message = f.get('message', '')[:150].replace('\n', ' ').replace('"', "'")
                      
                      writer.writerow([
                          f.get('file_path', 'N/A'),
                          f.get('function_name', 'N/A'),
                          f.get('severity', 'N/A'),
                          f"{f.get('score', 0):.2f}",
                          f.get('prediction', 'N/A'),
                          f.get('raw_model', {}).get('confidence_percent', 'N/A'),
                          '🔴 Yes' if f.get('prediction') == 1 else '✅ No',
                          message + '...' if len(f.get('message', '')) > 150 else message
                      ])
              
              print(f"✅ CSV created with {len(findings)} findings")
              
              # Save count for summary
              with open('counts.txt', 'w') as c:
                  vuln = sum(1 for f in findings if f.get('prediction') == 1)
                  safe = sum(1 for f in findings if f.get('prediction') == 0)
                  c.write(f"{len(findings)}\n{vuln}\n{safe}")
              
          except Exception as e:
              print(f"⚠️  CSV creation had an issue: {e}")
              # Create empty CSV on error
              with open('titan_results.csv', 'w') as f:
                  f.write('File Path,Function Name,Severity,Score,Prediction,Confidence,Vulnerable,Summary\n')
              with open('counts.txt', 'w') as c:
                  c.write("0\n0\n0")
          PYTHON
          
          echo "📄 CSV Preview:"
          cat titan_results.csv

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: titan-scan-results
          path: |
            titan_results.txt
            titan_results.csv

      - name: Display Summary
        if: always()
        run: |
          echo "## 🔍 TITAN Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f counts.txt ]; then
            TOTAL=$(sed -n '1p' counts.txt)
            VULN=$(sed -n '2p' counts.txt)
            SAFE=$(sed -n '3p' counts.txt)
          else
            TOTAL=0
            VULN=0
            SAFE=0
          fi
          
          echo "- **Total Functions Scanned:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- **Vulnerabilities Found:** 🔴 $VULN" >> $GITHUB_STEP_SUMMARY
          echo "- **Safe Functions:** ✅ $SAFE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Download **titan-scan-results.zip** from artifacts (includes CSV + raw output)" >> $GITHUB_STEP_SUMMARY
